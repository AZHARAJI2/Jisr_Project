name: jisr_app
description: A futuristic fintech mobile application for seamless digital transactions.
version: 1.0.0+1

environment:
  sdk: '>=3.3.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  font_awesome_flutter: 10.7.0
  provider: ^6.1.2
  lottie: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  # To use Tajawal or Cairo, we can use google_fonts or bundle them.
  # Using google_fonts is easier for this demo.
