name: crisis_bridge
description: Crisis Bridge - Offline money transfer app via mesh network
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Nearby Connections — نسخة محلية معدّلة
  nearby_connections:
    path: nearby_connections_local
  
  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Cryptography (SHA-256 signatures)
  crypto: ^3.0.3
  
  # Foreground Service
  flutter_foreground_task: ^6.1.0
  
  # Utilities
  uuid: ^4.2.2
  permission_handler: ^11.2.0

  # UI Dependencies
  provider: ^6.1.2
  google_fonts: ^6.2.1
  font_awesome_flutter: 10.7.0
  lottie: ^3.1.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true